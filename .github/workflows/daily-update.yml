name: Daily Content Update

on:
  schedule:
    # Runs every day at 11:00 UTC (6:00 AM Eastern, 3:00 AM Pacific)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allows you to manually trigger from GitHub

jobs:
  update-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run daily update script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_update.py

      - name: Commit and push changes
        run: |
          git config user.name "Tech Marketing Dose Bot"
          git config user.email "bot@techmarketingdose.ai"
          git add -A
          git diff --staged --quiet || git commit -m "Daily content update - $(date +'%Y-%m-%d')"
          git push
