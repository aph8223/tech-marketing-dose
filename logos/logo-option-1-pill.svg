<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Option 1: Pill/Capsule Icon -->
  <defs>
    <linearGradient id="pillGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <!-- Pill shape -->
  <rect x="12" y="30" width="55" height="40" rx="20" ry="20" fill="url(#pillGrad)"/>
  <line x1="39" y1="32" x2="39" y2="68" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <!-- AI circuit dots on pill -->
  <circle cx="26" cy="50" r="3" fill="rgba(255,255,255,0.9)"/>
  <circle cx="52" cy="50" r="3" fill="rgba(255,255,255,0.9)"/>
  <circle cx="39" cy="42" r="2" fill="rgba(255,255,255,0.6)"/>
  <circle cx="39" cy="58" r="2" fill="rgba(255,255,255,0.6)"/>
  <line x1="26" y1="50" x2="39" y2="42" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <line x1="52" y1="50" x2="39" y2="58" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>
  <!-- Text -->
  <text x="80" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="800" fill="#1a1a2e">Tech Marketing</text>
  <text x="80" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#e94560">Dose</text>
  <text x="80" y="88" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#888" letter-spacing="2">AI NEWS</text>
</svg>
