  </defs>
  <!-- Droplet shape -->
  <path d="M 40 15 Q 40 15 55 40 Q 65 55 55 67 Q 48 77 40 77 Q 32 77 25 67 Q 15 55 25 40 Q 40 15 40 15 Z" fill="url(#dropGrad)"/>
