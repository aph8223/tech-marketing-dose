<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Option 3: Lightning Bolt + D (Daily Dose energy) -->
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="10" y="15" width="70" height="70" rx="16" fill="#1a1a2e"/>
  <!-- Lightning bolt forming a "D" -->
  <path d="M 45 25 L 35 48 L 48 48 L 38 75" fill="none" stroke="#e94560" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Circular arc suggesting "D" -->
  <path d="M 42 25 Q 65 30 65 50 Q 65 70 42 75" fill="none" stroke="#533483" stroke-width="3" stroke-linecap="round"/>
  <!-- Small pulse dots -->
  <circle cx="60" cy="35" r="2" fill="#e94560" opacity="0.6"/>
  <circle cx="67" cy="50" r="2" fill="#533483" opacity="0.6"/>
  <circle cx="60" cy="65" r="2" fill="#e94560" opacity="0.6"/>
  <!-- Text -->
  <text x="92" y="42" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#1a1a2e" letter-spacing="1">TECH MARKETING</text>
  <text x="92" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#1a1a2e">DOSE</text>
  <!-- AI badge -->
  <rect x="195" y="55" width="32" height="20" rx="4" fill="url(#boltGrad)"/>
  <text x="200" y="69" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="white">AI</text>
</svg>
