<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Option 4: Rx/Prescription Style (dose as medicine metaphor) -->
  <defs>
    <linearGradient id="rxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <!-- Rx symbol stylized -->
  <text x="10" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" fill="url(#rxGrad)" font-style="italic">Rx</text>
  <!-- Crossbar on R stylized as circuit -->
  <line x1="42" y1="55" x2="68" y2="75" stroke="#533483" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="68" cy="75" r="3" fill="#533483"/>
  <circle cx="55" cy="65" r="2" fill="#e94560"/>
  <!-- Main text -->
  <text x="82" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#666" letter-spacing="2.5">TECH MARKETING</text>
  <text x="82" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="#1a1a2e">Dose</text>
  <!-- Separator -->
  <rect x="82" y="76" width="40" height="2" fill="#e94560"/>
  <!-- Tagline -->
  <text x="82" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#999" letter-spacing="1.5">YOUR DAILY AI NEWS PRESCRIPTION</text>
</svg>
