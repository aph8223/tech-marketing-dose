<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Option 5: Modern Stacked with Signal Wave -->
  <defs>
    <linearGradient id="stackGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="50%" style="stop-color:#533483"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
  </defs>
  <!-- Signal/pulse wave icon -->
  <path d="M 15 60 Q 25 60 30 45 Q 35 30 40 60 Q 45 90 50 60 Q 55 30 60 45 Q 65 60 75 60" fill="none" stroke="url(#stackGrad)" stroke-width="4" stroke-linecap="round"/>
  <!-- Small AI node -->
  <circle cx="75" cy="60" r="5" fill="#e94560"/>
  <circle cx="75" cy="60" r="8" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
  <!-- Stacked text -->
  <text x="95" y="35" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#888" letter-spacing="4">TECH MARKETING</text>
  <text x="95" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="40" font-weight="800" fill="#1a1a2e" letter-spacing="-1">DOSE</text>
  <!-- Gradient underline -->
  <rect x="95" y="80" width="135" height="4" rx="2" fill="url(#stackGrad)"/>
  <!-- Tagline -->
  <text x="95" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="11" font-weight="500" fill="#666">AI News for Tech Marketers</text>
</svg>
