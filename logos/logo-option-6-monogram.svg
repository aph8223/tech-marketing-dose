<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="400" height="100">
  <!-- Option 6: TMD Monogram + Wordmark -->
  <defs>
    <linearGradient id="monoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  <!-- Circle background -->
  <circle cx="45" cy="50" r="35" fill="url(#monoGrad)"/>
  <!-- TMD letters interleaved -->
  <text x="24" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="800" fill="white" letter-spacing="1">TM</text>
  <text x="53" y="63" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="800" fill="#e94560">D</text>
  <!-- Small signal arcs around circle -->
  <path d="M 75 30 Q 82 40 82 50" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <path d="M 78 25 Q 88 38 88 50" fill="none" stroke="#e94560" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  <!-- Wordmark -->
  <text x="100" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#666" letter-spacing="2">TECH MARKETING</text>
  <text x="100" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#1a1a2e">Dose</text>
  <!-- Small pill accent dots -->
  <circle cx="100" y="80" r="3" fill="#e94560"/>
  <circle cx="110" cy="80" r="3" fill="#533483"/>
  <circle cx="120" cy="80" r="3" fill="#0f3460"/>
</svg>
